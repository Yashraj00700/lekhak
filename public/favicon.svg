<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4622D"/>
      <stop offset="100%" stop-color="#A04A1F"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Warli-style figure: open book + sun -->
  <g fill="none" stroke="#FAF3E0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Sun -->
    <circle cx="32" cy="18" r="4" fill="#C9973A" stroke="#FAF3E0"/>
    <line x1="32" y1="6" x2="32" y2="10"/>
    <line x1="22" y1="10" x2="25" y2="13"/>
    <line x1="42" y1="10" x2="39" y2="13"/>
    <!-- Open book / पुस्तक -->
    <path d="M12 36 L32 32 L52 36 L52 50 L32 46 L12 50 Z" fill="#F5EDD6"/>
    <line x1="32" y1="32" x2="32" y2="46"/>
    <!-- Ink lines -->
    <line x1="18" y1="40" x2="28" y2="38.5" stroke="#2A1810" stroke-width="1.2"/>
    <line x1="18" y1="44" x2="28" y2="42.5" stroke="#2A1810" stroke-width="1.2"/>
    <line x1="36" y1="38.5" x2="46" y2="40" stroke="#2A1810" stroke-width="1.2"/>
    <line x1="36" y1="42.5" x2="46" y2="44" stroke="#2A1810" stroke-width="1.2"/>
  </g>
</svg>
